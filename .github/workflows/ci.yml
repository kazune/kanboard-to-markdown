name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            exit 0
          fi
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          else
            brew install shellcheck
          fi

      - name: Check Bash syntax
        run: bash -n kanboard-md tests/*.sh

      - name: Run ShellCheck
        run: shellcheck kanboard-md tests/*.sh

      - name: Run tests
        run: |
          for test_script in tests/*-test.sh; do
            "$test_script"
          done
